<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحسابات - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
            transition: var(--transition);
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .back-btn:hover {
            border-color: var(--accent);
            transform: translateX(-4px);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .actions-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 0 24px;
            margin-bottom: 24px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .action-btn:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .action-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin: 0 24px 24px 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .type-income {
            color: var(--success);
        }

        .type-expense {
            color: var(--danger);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .actions-bar { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">💰 الحسابات</div>
    <div class="user-area">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-name" id="userName"></div>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card" onclick="goToTreasury()">
        <div class="value" id="totalBalance">0</div>
        <div class="label">إجمالي الرصيد</div>
    </div>
    <div class="stat-card">
        <div class="value" id="totalIncome">0</div>
        <div class="label">إجمالي الإيرادات</div>
    </div>
    <div class="stat-card">
        <div class="value" id="totalExpense">0</div>
        <div class="label">إجمالي المصروفات</div>
    </div>
    <div class="stat-card">
        <div class="value" id="monthlyExpense">0</div>
        <div class="label">مصروفات هذا الشهر</div>
    </div>
</div>

<div class="actions-bar">
    <button class="action-btn primary" onclick="goToCash()">
        <span>💵</span> بطاقة الكاش
    </button>
    <button class="action-btn" onclick="goToTreasury()">
        <span>🏦</span> الخزينة
    </button>
    <button class="action-btn" onclick="goToZarf()">
        <span>📨</span> ظرف القبض
    </button>
    <button class="action-btn" onclick="exportAccountingReport()">
        <span>📊</span> تقرير
    </button>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title">📋 آخر المعاملات</div>
    </div>
    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>البيان</th>
                    <th>الفئة</th>
                    <th>النوع</th>
                    <th>المبلغ</th>
                </tr>
            </thead>
            <tbody id="transactionsTable">
                <tr><td colspan="5" style="text-align:center;">جاري التحميل...<\/td><\/tr>
            </tbody>
        </table>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================================
    // بيانات تجريبية
    // ============================================================
    let transactions = [
        { id: 1, date: "2026-03-01", description: "إعانة شهر مارس", category: "إعانات", type: "expense", amount: 200000 },
        { id: 2, date: "2026-03-05", description: "مرتبات الموظفين", category: "مرتبات", type: "expense", amount: 25000 },
        { id: 3, date: "2026-03-10", description: "إيجار المكتب", category: "إيجار", type: "expense", amount: 5000 },
        { id: 4, date: "2026-03-15", description: "تبرعات", category: "إعانات", type: "income", amount: 300000 },
        { id: 5, date: "2026-03-20", description: "كهرباء", category: "كهرباء", type: "expense", amount: 1500 }
    ];
    
    let currentUser = { id: 1, name: "سيد راشد", role: "admin", avatar: "👑" };
    
    // ============================================================
    // تحديث الإحصائيات
    // ============================================================
    function updateStats() {
        const totalIncome = transactions.filter(t => t.type === "income").reduce((sum, t) => sum + t.amount, 0);
        const totalExpense = transactions.filter(t => t.type === "expense").reduce((sum, t) => sum + t.amount, 0);
        const balance = totalIncome - totalExpense;
        const currentMonth = new Date().getMonth() + 1;
        const monthlyExpense = transactions.filter(t => t.type === "expense" && new Date(t.date).getMonth() + 1 === currentMonth).reduce((sum, t) => sum + t.amount, 0);
        
        document.getElementById('totalBalance').innerText = balance.toLocaleString('ar-EG');
        document.getElementById('totalIncome').innerText = totalIncome.toLocaleString('ar-EG');
        document.getElementById('totalExpense').innerText = totalExpense.toLocaleString('ar-EG');
        document.getElementById('monthlyExpense').innerText = monthlyExpense.toLocaleString('ar-EG');
    }
    
    // ============================================================
    // عرض المعاملات
    // ============================================================
    function renderTransactions() {
        const tbody = document.getElementById('transactionsTable');
        const recent = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        
        if (recent.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد معاملات<\/td><\/tr>';
            return;
        }
        
        tbody.innerHTML = recent.map(t => `
            <tr>
                <td>${t.date}</td>
                <td>${t.description}</td>
                <td>${t.category}</td>
                <td class="${t.type === 'income' ? 'type-income' : 'type-expense'}">${t.type === 'income' ? 'إيراد' : 'مصروف'}<\/td>
                <td>${t.amount.toLocaleString('ar-EG')} ج.م<\/td>
            </tr>
        `).join('');
    }
    
    // ============================================================
    // التنقل
    // ============================================================
    function goToCash() {
        window.location.href = '/modules/accounting/cards/cash.html';
    }
    
    function goToTreasury() {
        window.location.href = '/modules/accounting/treasury/index.html';
    }
    
    function goToZarf() {
        window.location.href = '/modules/accounting/cards/zarf.html';
    }
    
    function exportAccountingReport() {
        showToast('جاري تصدير التقرير...');
        setTimeout(() => showToast('✅ تم تصدير التقرير'), 1500);
    }
    
    // ============================================================
    // دوال مساعدة
    // ============================================================
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    function goBack() {
        window.location.href = '/index.html';
    }
    
    function updateUserInfo() {
        document.getElementById('userAvatar').innerText = currentUser.avatar;
        document.getElementById('userName').innerText = currentUser.name;
    }
    
    // ============================================================
    // التهيئة
    // ============================================================
    function init() {
        updateUserInfo();
        updateStats();
        renderTransactions();
    }
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
