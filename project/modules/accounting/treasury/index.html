<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخزينة - نظام إدارة البحث الاجتماعي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
        }
        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }
        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-badge {
            background: var(--danger);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: #0F1117; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #0F1117; }
        .btn:hover { transform: translateY(-1px); opacity: 0.9; }
        .table-container { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">🏦 الخزينة</div>
    <div class="user-area">
        <div class="admin-badge">👑 للمدير فقط</div>
    </div>
</div>

<div class="container">
    
    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="totalBalance">0</div>
            <div class="label">الرصيد المعتمد</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalLiabilities">0</div>
            <div class="label">إجمالي الالتزامات</div>
        </div>
        <div class="stat-card">
            <div class="value" id="availableBalance">0</div>
            <div class="label">الرصيد الفعلي (المتاح)</div>
        </div>
        <div class="stat-card">
            <div class="value" id="monthlyExpense">0</div>
            <div class="label">مصروفات هذا الشهر</div>
        </div>
    </div>

    <div class="grid-2">
        <!-- إضافة سلفة جديدة -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">➕ إضافة سلفة جديدة</div>
            </div>
            <div class="form-group">
                <label>نوع السلفة</label>
                <select id="loanType">
                    <option value="employee">سلفة موظف</option>
                    <option value="external">سلفة جهة خارجية</option>
                    <option value="purchase">مشتريات (مخزنية)</option>
                </select>
            </div>
            <div class="form-group">
                <label>اسم المستفيد / الجهة</label>
                <input type="text" id="loanBeneficiary" placeholder="أدخل الاسم">
            </div>
            <div class="form-group">
                <label>المبلغ</label>
                <input type="number" id="loanAmount" placeholder="المبلغ">
            </div>
            <div class="form-group">
                <label>طريقة السداد</label>
                <select id="loanRepayment">
                    <option value="installment">أقساط شهرية</option>
                    <option value="one_time">دفعة واحدة</option>
                </select>
            </div>
            <div class="form-group" id="installmentCountGroup" style="display:none;">
                <label>عدد الأقساط</label>
                <input type="number" id="installmentCount" placeholder="عدد الأقساط">
            </div>
            <div class="form-group">
                <label>ملاحظات</label>
                <input type="text" id="loanNotes" placeholder="ملاحظات">
            </div>
            <button class="btn btn-primary" onclick="addLoan()">➕ إضافة السلفة</button>
        </div>

        <!-- رصيد الخزينة الحالي -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">💰 رصيد الخزينة</div>
            </div>
            <div class="form-group">
                <label>الرصيد المعتمد</label>
                <input type="number" id="approvedBalance" placeholder="الرصيد المعتمد">
            </div>
            <button class="btn btn-success" onclick="updateBalance()">💾 تحديث الرصيد</button>
        </div>
    </div>

    <!-- قائمة الالتزامات (ظهر الخزينة) -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">📋 ظهر الخزينة (الالتزامات)</div>
            <button class="btn btn-warning" onclick="exportLoans()">📊 تصدير</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr><th>#</th><th>النوع</th><th>المستفيد</th><th>المبلغ الأصلي</th><th>المتبقي</th><th>طريقة السداد</th><th>الحالة</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="loansTable">
                    <tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let loans = [];
    let approvedBalance = 0;

    function loadFromStorage() {
        const savedLoans = localStorage.getItem('treasury_loans');
        if (savedLoans) loans = JSON.parse(savedLoans);
        else loans = [
            { id: 1, type: 'employee', beneficiary: 'أحمد محمد', amount: 10000, remaining: 10000, repayment: 'installment', installments: 10, paidInstallments: 0, status: 'active', notes: '', date: '2026-03-30' },
            { id: 2, type: 'purchase', beneficiary: 'مشتريات بامبرز', amount: 7000, remaining: 7000, repayment: 'one_time', installments: 0, paidInstallments: 0, status: 'active', notes: '', date: '2026-03-30' },
            { id: 3, type: 'external', beneficiary: 'جهة خارجية', amount: 15000, remaining: 15000, repayment: 'installment', installments: 5, paidInstallments: 0, status: 'active', notes: '', date: '2026-03-30' }
        ];
        
        const savedBalance = localStorage.getItem('treasury_approved_balance');
        if (savedBalance) approvedBalance = parseFloat(savedBalance);
        else approvedBalance = 50000;
        
        updateStats();
        renderLoans();
    }

    function saveToStorage() {
        localStorage.setItem('treasury_loans', JSON.stringify(loans));
        localStorage.setItem('treasury_approved_balance', approvedBalance);
        updateStats();
    }

    function updateStats() {
        const totalLiabilities = loans.filter(l => l.status === 'active').reduce((sum, l) => sum + l.remaining, 0);
        const availableBalance = approvedBalance - totalLiabilities;
        const monthlyExpense = 243000; // مؤقت
        
        document.getElementById('totalBalance').innerText = approvedBalance.toLocaleString('ar-EG');
        document.getElementById('totalLiabilities').innerText = totalLiabilities.toLocaleString('ar-EG');
        document.getElementById('availableBalance').innerText = availableBalance.toLocaleString('ar-EG');
        document.getElementById('monthlyExpense').innerText = monthlyExpense.toLocaleString('ar-EG');
        
        document.getElementById('approvedBalance').value = approvedBalance;
    }

    function renderLoans() {
        const tbody = document.getElementById('loansTable');
        if (loans.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد التزامات</td></tr>';
            return;
        }
        
        const typeMap = { employee: '👤 سلفة موظف', external: '🏢 سلفة جهة', purchase: '🛒 مشتريات' };
        const statusMap = { active: '🟢 نشط', completed: '✅ مكتمل' };
        
        tbody.innerHTML = loans.map((loan, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td>${typeMap[loan.type] || loan.type}</td>
                <td>${loan.beneficiary}</td>
                <td>${loan.amount.toLocaleString('ar-EG')} ج.م</td>
                <td>${loan.remaining.toLocaleString('ar-EG')} ج.م</td>
                <td>${loan.repayment === 'installment' ? `${loan.installments} أقساط` : 'دفعة واحدة'}</td>
                <td>${statusMap[loan.status] || loan.status}</td>
                <td class="action-icons">
                    <button class="btn btn-success" onclick="recordPayment(${loan.id})" style="padding:4px 8px;">💰 سداد</button>
                    <button class="btn btn-warning" onclick="editLoan(${loan.id})" style="padding:4px 8px;">✏️</button>
                    <button class="btn btn-danger" onclick="deleteLoan(${loan.id})" style="padding:4px 8px;">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function addLoan() {
        const type = document.getElementById('loanType').value;
        const beneficiary = document.getElementById('loanBeneficiary').value.trim();
        const amount = parseFloat(document.getElementById('loanAmount').value);
        const repayment = document.getElementById('loanRepayment').value;
        const installments = parseInt(document.getElementById('installmentCount').value) || 0;
        const notes = document.getElementById('loanNotes').value;
        
        if (!beneficiary || !amount) {
            showToast('الرجاء إدخال المستفيد والمبلغ');
            return;
        }
        
        const newId = loans.length > 0 ? Math.max(...loans.map(l => l.id)) + 1 : 1;
        loans.push({
            id: newId,
            type, beneficiary, amount, remaining: amount,
            repayment, installments: repayment === 'installment' ? installments : 0,
            paidInstallments: 0, status: 'active', notes,
            date: new Date().toISOString().slice(0,10)
        });
        
        saveToStorage();
        renderLoans();
        clearLoanForm();
        showToast('✅ تم إضافة السلفة بنجاح');
    }

    function recordPayment(id) {
        const loan = loans.find(l => l.id === id);
        if (!loan || loan.status !== 'active') return;
        
        let amount = prompt(`المبلغ المراد سداده (المتبقي: ${loan.remaining} جنيه):`);
        if (!amount) return;
        amount = parseFloat(amount);
        
        if (amount > loan.remaining) {
            showToast('⚠️ المبلغ أكبر من المتبقي');
            return;
        }
        
        loan.remaining -= amount;
        if (loan.repayment === 'installment') {
            loan.paidInstallments++;
        }
        if (loan.remaining <= 0) {
            loan.status = 'completed';
            loan.remaining = 0;
        }
        
        saveToStorage();
        renderLoans();
        showToast(`✅ تم تسجيل سداد ${amount.toLocaleString('ar-EG')} جنيه`);
    }

    function editLoan(id) {
        const loan = loans.find(l => l.id === id);
        if (!loan) return;
        
        const newBeneficiary = prompt('المستفيد:', loan.beneficiary);
        if (newBeneficiary) loan.beneficiary = newBeneficiary;
        
        const newAmount = prompt('المبلغ:', loan.amount);
        if (newAmount) {
            const diff = loan.amount - parseFloat(newAmount);
            loan.amount = parseFloat(newAmount);
            loan.remaining = Math.max(0, loan.remaining - diff);
        }
        
        saveToStorage();
        renderLoans();
        showToast('✅ تم التعديل');
    }

    function deleteLoan(id) {
        if (confirm('هل أنت متأكد من حذف هذه السلفة؟')) {
            loans = loans.filter(l => l.id !== id);
            saveToStorage();
            renderLoans();
            showToast('🗑️ تم الحذف');
        }
    }

    function updateBalance() {
        const newBalance = parseFloat(document.getElementById('approvedBalance').value);
        if (!isNaN(newBalance) && newBalance >= 0) {
            approvedBalance = newBalance;
            saveToStorage();
            showToast('✅ تم تحديث الرصيد المعتمد');
        }
    }

    function exportLoans() {
        let csv = 'النوع,المستفيد,المبلغ الأصلي,المتبقي,طريقة السداد,الحالة\n';
        loans.forEach(l => {
            csv += `${l.type},${l.beneficiary},${l.amount},${l.remaining},${l.repayment},${l.status}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'treasury_loans.csv';
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📊 تم تصدير البيانات');
    }

    function clearLoanForm() {
        document.getElementById('loanBeneficiary').value = '';
        document.getElementById('loanAmount').value = '';
        document.getElementById('loanNotes').value = '';
        document.getElementById('installmentCount').value = '';
    }

    document.getElementById('loanRepayment').addEventListener('change', function() {
        const group = document.getElementById('installmentCountGroup');
        group.style.display = this.value === 'installment' ? 'block' : 'none';
    });

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function goBack() { window.location.href = '/index.html'; }

    loadFromStorage();
</script>
</body>
</html>
