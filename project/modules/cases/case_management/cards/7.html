<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقرير والتوصية الذكية</title>
    <style>
        /* التنسيقات الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تنسيق البطاقة */
        .page {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* تنسيق العناوين */
        h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        h4 {
            color: #555;
            margin-bottom: 10px;
        }

        /* تنسيق منطقة النص */
        .textarea-clean {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        /* تنسيق حقل الإدخال */
        .input-clean {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* إعدادات الطباعة */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .page {
                box-shadow: none;
                border: 1px solid #eee;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <h3>التقرير الذكي</h3>
        
        <textarea class="textarea-clean" placeholder="اكتب التقرير هنا..." 
        oninput="if(document.getElementById('out_ai_report')) document.getElementById('out_ai_report').innerText=this.value"></textarea>
        
        <h4>التوصية الذكية</h4>
        
        <input class="input-clean" placeholder="اكتب التوصية هنا..." 
        oninput="if(document.getElementById('out_ai_rec')) document.getElementById('out_ai_rec').innerText=this.value">
    </div>

</body>
</html>
