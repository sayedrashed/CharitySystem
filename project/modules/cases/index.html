<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الحالات - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
        }

        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }
        .back-btn:hover { border-color: var(--accent); transform: translateX(-4px); }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-area { display: flex; align-items: center; gap: 15px; }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .stat-card .value { font-size: 28px; font-weight: 800; color: var(--accent); }
        .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }

        .actions-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 0 24px;
            margin-bottom: 24px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .action-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }

        .search-bar { padding: 0 24px; margin-bottom: 24px; }
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .search-input:focus { outline: none; border-color: var(--accent); }

        .table-container { padding: 0 24px; overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
        }
        .data-table th {
            text-align: right;
            padding: 15px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .data-table tr:hover { background: var(--bg-secondary); }

        .case-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-danger { background: rgba(248,113,113,0.15); color: var(--danger); }
        .badge-warning { background: rgba(245,166,35,0.15); color: var(--warning); }
        .badge-success { background: rgba(46,202,171,0.15); color: var(--success); }

        .action-icons { display: flex; gap: 12px; }
        .action-icon { cursor: pointer; font-size: 18px; transition: all 0.3s ease; }
        .action-icon:hover { transform: scale(1.1); }
        .view-icon { color: var(--success); }
        .edit-icon { color: var(--accent); }
        .delete-icon { color: var(--danger); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 500px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-family: inherit;
        }
        .modal-content textarea { resize: vertical; min-height: 80px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-cancel { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 20px; border-radius: 8px; cursor: pointer; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 24px;
        }
        .page-btn {
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .actions-bar { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">🏠 إدارة الحالات</div>
    <div class="user-area">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-name" id="userName"></div>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card" onclick="filterCases('all')"><div class="value" id="totalCases">0</div><div class="label">إجمالي الحالات</div></div>
    <div class="stat-card" onclick="filterCases('pending')"><div class="value" id="pendingCases">0</div><div class="label">قيد المراجعة</div></div>
    <div class="stat-card" onclick="filterCases('approved')"><div class="value" id="approvedCases">0</div><div class="label">مقبولة</div></div>
    <div class="stat-card" onclick="filterCases('incomplete')"><div class="value" id="incompleteCases">0</div><div class="label">ناقصة بيانات</div></div>
</div>

<div class="actions-bar">
    <button class="action-btn primary" onclick="openNewCase()"><span>➕</span> حالة جديدة</button>
    <button class="action-btn" onclick="openReeval()"><span>🔄</span> إعادة تقييم</button>
    <button class="action-btn" onclick="printOfficeSearchForm()"><span>📋</span> بحث مكتبي</button>
    <button class="action-btn" onclick="printHomeVisitForm()"><span>🚶</span> زيارة منزلية</button>
    <button class="action-btn" onclick="openVisitPlanner()"><span>🗺️</span> خطط الزيارات</button>
    <button class="action-btn" onclick="openSmartEngine()"><span>⚙️</span> المحرك الذكي</button>
</div>

<div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 بحث بالاسم، الرقم القومي، أو رقم الحالة..." onkeyup="searchCases()">
</div>

<div class="table-container">
    <table class="data-table">
        <thead><tr><th>م.ع</th><th>الاسم</th><th>الفئة</th><th>الحالة</th><th>آخر تحديث</th><th>الإجراءات</th></tr></thead>
        <tbody id="casesTableBody"><tr><td colspan="6" style="text-align:center;">جاري التحميل...</td></tr></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>

<!-- مودال إضافة حالة -->
<div id="newCaseModal" class="modal">
    <div class="modal-content">
        <h3>➕ حالة جديدة</h3>
        <input type="text" id="caseName" placeholder="الاسم الكامل">
        <input type="text" id="caseNationalId" placeholder="الرقم القومي (14 رقم)">
        <input type="text" id="casePhone" placeholder="رقم الهاتف">
        <textarea id="caseAddress" placeholder="العنوان"></textarea>
        <select id="caseCategory"><option value="">اختر الفئة</option><option value="شبرا">شبرا</option><option value="النهضة">النهضة</option><option value="معاقين">معاقين</option><option value="الشركة">الشركة</option></select>
        <div class="modal-buttons"><button class="btn-save" onclick="saveNewCase()">حفظ</button><button class="btn-cancel" onclick="closeModal('newCaseModal')">إلغاء</button></div>
    </div>
</div>

<!-- مودال تعديل حالة -->
<div id="editCaseModal" class="modal">
    <div class="modal-content">
        <h3>✏️ تعديل حالة</h3>
        <input type="hidden" id="editCaseId">
        <input type="text" id="editCaseName" placeholder="الاسم الكامل">
        <input type="text" id="editCaseNationalId" placeholder="الرقم القومي">
        <input type="text" id="editCasePhone" placeholder="رقم الهاتف">
        <textarea id="editCaseAddress" placeholder="العنوان"></textarea>
        <select id="editCaseCategory"><option value="">اختر الفئة</option><option value="شبرا">شبرا</option><option value="النهضة">النهضة</option><option value="معاقين">معاقين</option><option value="الشركة">الشركة</option></select>
        <select id="editCaseStatus"><option value="قيد المراجعة">قيد المراجعة</option><option value="مقبولة">مقبولة</option><option value="مرفوضة">مرفوضة</option><option value="موقوفة">موقوفة</option><option value="معلقة">معلقة</option></select>
        <div class="modal-buttons"><button class="btn-save" onclick="updateCase()">حفظ</button><button class="btn-cancel" onclick="closeModal('editCaseModal')">إلغاء</button></div>
    </div>
</div>

<!-- مودال تأكيد الحذف -->
<div id="deleteConfirmModal" class="modal">
    <div class="modal-content">
        <h3>🗑️ تأكيد الحذف</h3>
        <p>هل أنت متأكد من حذف هذه الحالة؟</p>
        <p id="deleteCaseName" style="color: var(--danger); font-weight: bold;"></p>
        <div class="modal-buttons"><button class="btn-save" onclick="confirmDelete()" style="background: var(--danger);">نعم، حذف</button><button class="btn-cancel" onclick="closeModal('deleteConfirmModal')">إلغاء</button></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // بيانات تجريبية
    let allCases = [
        { id: 1, serial: 101, name: "أحمد محمود علي", category: "شبرا", status: "قيد المراجعة", phone: "01012345678", address: "شبرا الخيمة", nationalId: "29010112345678", updatedAt: "2026-03-28" },
        { id: 2, serial: 102, name: "سارة علي إبراهيم", category: "النهضة", status: "مقبولة", phone: "01123456789", address: "النهضة", nationalId: "29120112345678", updatedAt: "2026-03-25" },
        { id: 3, serial: 103, name: "محمود خالد سعيد", category: "معاقين", status: "قيد المراجعة", phone: "01234567890", address: "شبرا", nationalId: "29210112345678", updatedAt: "2026-03-20" },
        { id: 4, serial: 104, name: "فاطمة حسن محمد", category: "شبرا", status: "مقبولة", phone: "01512345678", address: "شبرا الخيمة", nationalId: "29310112345678", updatedAt: "2026-03-18" },
        { id: 5, serial: 105, name: "علي إبراهيم محمود", category: "الشركة", status: "ناقصة بيانات", phone: "01098765432", address: "العبور", nationalId: "29410112345678", updatedAt: "2026-03-15" },
        { id: 6, serial: 106, name: "نورا أحمد سعيد", category: "النهضة", status: "مقبولة", phone: "01187654321", address: "النهضة", nationalId: "29510112345678", updatedAt: "2026-03-10" },
        { id: 7, serial: 107, name: "يوسف سامي خليل", category: "معاقين", status: "موقوفة", phone: "01234567890", address: "شبرا", nationalId: "29610112345678", updatedAt: "2026-03-05" },
        { id: 8, serial: 108, name: "ليلى محمود حسن", category: "شبرا", status: "ناقصة بيانات", phone: "01598765432", address: "شبرا الخيمة", nationalId: "29710112345678", updatedAt: "2026-03-01" }
    ];

    let currentUser = { id: 1, name: "سيد راشد", role: "admin", avatar: "👑" };
    let currentFilter = "all";
    let currentSearch = "";
    let currentPage = 1;
    const itemsPerPage = 10;
    let deleteCaseId = null;

    function updateStats() {
        const total = allCases.length;
        const pending = allCases.filter(c => c.status === "قيد المراجعة").length;
        const approved = allCases.filter(c => c.status === "مقبولة").length;
        const incomplete = allCases.filter(c => c.status === "ناقصة بيانات").length;
        document.getElementById('totalCases').innerText = total;
        document.getElementById('pendingCases').innerText = pending;
        document.getElementById('approvedCases').innerText = approved;
        document.getElementById('incompleteCases').innerText = incomplete;
    }

    function getFilteredCases() {
        let filtered = allCases;
        if (currentFilter !== 'all') {
            const filterMap = { 'pending': 'قيد المراجعة', 'approved': 'مقبولة', 'incomplete': 'ناقصة بيانات' };
            filtered = filtered.filter(c => c.status === filterMap[currentFilter]);
        }
        if (currentSearch) {
            const searchLower = currentSearch.toLowerCase();
            filtered = filtered.filter(c => c.name.toLowerCase().includes(searchLower) || c.serial.toString().includes(searchLower) || (c.nationalId && c.nationalId.includes(searchLower)));
        }
        return filtered;
    }

    function renderCases() {
        const filtered = getFilteredCases();
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const pageCases = filtered.slice(start, start + itemsPerPage);
        const tbody = document.getElementById('casesTableBody');
        if (pageCases.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا توجد حالات</td></tr>'; return; }
        tbody.innerHTML = pageCases.map(c => {
            let badgeClass = c.status === 'قيد المراجعة' ? 'badge-warning' : (c.status === 'مقبولة' ? 'badge-success' : 'badge-danger');
            return `<tr><td>${c.serial}</td><td>${c.name}</td><td>${c.category}</td><td><span class="case-badge ${badgeClass}">${c.status}</span></td><td>${c.updatedAt}</td><td class="action-icons"><span class="action-icon view-icon" onclick="viewCase(${c.id})" title="عرض">👁️</span><span class="action-icon edit-icon" onclick="openEditCaseModal(${c.id})" title="تعديل">✏️</span><span class="action-icon delete-icon" onclick="openDeleteConfirm(${c.id}, '${c.name}')" title="حذف">🗑️</span></td></tr>`;
        }).join('');
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '';
        for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        container.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; renderCases(); }
    function filterCases(type) { currentFilter = type; currentPage = 1; renderCases(); updateStats(); }
    function searchCases() { currentSearch = document.getElementById('searchInput').value; currentPage = 1; renderCases(); }

    function openNewCase() { window.location.href = '/modules/cases/case_management/case_view.html?mode=new'; }
    function openReeval() { alert('يرجى اختيار الحالة المراد إعادة تقييمها'); }
    function openVisitPlanner() { window.location.href = '/modules/cases/visit_management/index.html'; }
    function openSmartEngine() { alert('فتح المحرك الذكي...'); }

    function printOfficeSearchForm() {
        const win = window.open('', '_blank');
        win.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>استمارة البحث المكتبي</title><style>body{font-family:'Times New Roman';margin:20px;direction:rtl;}h2{text-align:center;}table{width:100%;border-collapse:collapse;margin:20px 0;}th,td{border:1px solid #000;padding:8px;text-align:center;}th{background:#f0f0f0;}.field-row{margin-bottom:15px;display:flex;}.field-label{width:120px;font-weight:bold;}.field-line{flex:1;border-bottom:1px solid #000;height:25px;}</style></head><body><h2>استمارة البحث المكتبي</h2><div class="field-row"><div class="field-label">الاسم:</div><div class="field-line"></div></div><div class="field-row"><div class="field-label">الرقم القومي:</div><div class="field-line"></div></div><div class="field-row"><div class="field-label">العنوان:</div><div class="field-line"></div></div><div class="field-row"><div class="field-label">التليفون:</div><div class="field-line"></div></div><h3>جدول تكوين الأسرة</h3><table><thead><tr><th>م</th><th>الاسم</th><th>صلة القرابة</th><th>الحالة الاجتماعية</th><th>العمل</th><th>السن</th></tr></thead><tbody>${Array(8).fill().map((_,i)=>`<tr><td>${i+1}</td><td></td><td></td><td></td><td></td><td></td></tr>`).join('')}</tbody></table><div style="text-align:center;margin-top:20px;"><button onclick="window.print()">طباعة</button></div></body></html>`);
        win.document.close();
    }

    function printHomeVisitForm() {
        const win = window.open('', '_blank');
        win.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>استمارة الزيارة المنزلية</title><style>body{font-family:'Times New Roman';margin:20px;direction:rtl;}h2{text-align:center;}table{width:100%;border-collapse:collapse;margin:20px 0;}th,td{border:1px solid #000;padding:8px;text-align:center;}th{background:#f0f0f0;}.field-row{margin-bottom:15px;display:flex;}.field-label{width:120px;font-weight:bold;}.field-line{flex:1;border-bottom:1px solid #000;height:25px;}.visit-times{display:flex;gap:20px;margin:20px 0;}.visit-time{flex:1;text-align:center;}.visit-time .line{border-bottom:1px solid #000;height:25px;margin-top:5px;}</style></head><body><h2>استمارة الزيارة المنزلية</h2><div class="field-row"><div class="field-label">اسم الحالة:</div><div class="field-line"></div></div><div class="field-row"><div class="field-label">م.ع:</div><div class="field-line"></div></div><div class="visit-times"><div class="visit-time"><div>وقت البدء</div><div class="line"></div></div><div class="visit-time"><div>وقت الانتهاء</div><div class="line"></div></div></div><div class="field-row"><div class="field-label">نتيجة الزيارة:</div><div class="field-line"></div></div><div class="field-row"><div class="field-label">ملاحظات:</div><div class="field-line" style="height:80px;"></div></div><div style="text-align:center;margin-top:20px;"><button onclick="window.print()">طباعة</button></div></body></html>`);
        win.document.close();
    }

    function openEditCaseModal(id) {
        const c = allCases.find(c => c.id === id);
        if (!c) return;
        document.getElementById('editCaseId').value = c.id;
        document.getElementById('editCaseName').value = c.name;
        document.getElementById('editCaseNationalId').value = c.nationalId || '';
        document.getElementById('editCasePhone').value = c.phone || '';
        document.getElementById('editCaseAddress').value = c.address || '';
        document.getElementById('editCaseCategory').value = c.category;
        document.getElementById('editCaseStatus').value = c.status;
        document.getElementById('editCaseModal').classList.add('active');
    }

    function updateCase() {
        const id = parseInt(document.getElementById('editCaseId').value);
        const index = allCases.findIndex(c => c.id === id);
        if (index === -1) return;
        allCases[index] = { ...allCases[index], name: document.getElementById('editCaseName').value, nationalId: document.getElementById('editCaseNationalId').value, phone: document.getElementById('editCasePhone').value, address: document.getElementById('editCaseAddress').value, category: document.getElementById('editCaseCategory').value, status: document.getElementById('editCaseStatus').value, updatedAt: new Date().toISOString().slice(0,10) };
        updateStats(); renderCases(); closeModal('editCaseModal'); showToast('تم تحديث الحالة');
    }

    function saveNewCase() {
        const name = document.getElementById('caseName').value;
        const nationalId = document.getElementById('caseNationalId').value;
        const phone = document.getElementById('casePhone').value;
        const address = document.getElementById('caseAddress').value;
        const category = document.getElementById('caseCategory').value;
        if (!name || !nationalId || !phone || !address || !category) { showToast('الرجاء ملء جميع الحقول'); return; }
        const newId = Math.max(...allCases.map(c => c.id), 0) + 1;
        const newSerial = Math.max(...allCases.map(c => c.serial), 0) + 1;
        allCases.push({ id: newId, serial: newSerial, name, category, status: 'قيد المراجعة', phone, address, nationalId, updatedAt: new Date().toISOString().slice(0,10) });
        updateStats(); renderCases(); closeModal('newCaseModal'); showToast('تم إضافة الحالة');
        document.getElementById('caseName').value = ''; document.getElementById('caseNationalId').value = ''; document.getElementById('casePhone').value = ''; document.getElementById('caseAddress').value = ''; document.getElementById('caseCategory').value = '';
    }

    function viewCase(id) { showToast(`عرض الحالة رقم ${id}`); }
    function openDeleteConfirm(id, name) { deleteCaseId = id; document.getElementById('deleteCaseName').innerText = name; document.getElementById('deleteConfirmModal').classList.add('active'); }
    function confirmDelete() { if (deleteCaseId) { allCases = allCases.filter(c => c.id !== deleteCaseId); updateStats(); renderCases(); showToast('تم حذف الحالة'); } closeModal('deleteConfirmModal'); deleteCaseId = null; }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
    function goBack() { window.location.href = '/index.html'; }
    function updateUserInfo() { document.getElementById('userAvatar').innerText = currentUser.avatar; document.getElementById('userName').innerText = currentUser.name; }

    function init() { updateUserInfo(); updateStats(); renderCases(); }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
