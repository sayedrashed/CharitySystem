<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حالات خاصة - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            background: var(--danger);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: #0F1117;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: #0F1117;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .transfer-badge {
            background: var(--success);
            color: #0F1117;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .pending-badge {
            background: var(--warning);
            color: #0F1117;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">⭐ حالات خاصة</div>
    <div class="user-area">
        <div class="admin-badge">👑 للمدير فقط</div>
    </div>
</div>

<div class="container">
    
    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="totalSpecial">0</div>
            <div class="label">إجمالي الحالات الخاصة</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalTransferred">0</div>
            <div class="label">تم التحويل</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalPending">0</div>
            <div class="label">بانتظار التحويل</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalAmount">0</div>
            <div class="label">إجمالي المساعدات</div>
        </div>
    </div>

    <!-- إضافة حالة خاصة -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">➕ إضافة حالة خاصة</div>
        </div>
        <div class="form-group">
            <label>اختر حالة من القاعدة</label>
            <select id="selectCase">
                <option value="">-- اختر حالة --</option>
            </select>
        </div>
        <div class="form-group">
            <label>الاسم</label>
            <input type="text" id="caseName" readonly>
        </div>
        <div class="form-group">
            <label>الرقم المسلسل</label>
            <input type="text" id="caseSerial" readonly>
        </div>
        <div class="form-group">
            <label>رقم المحفظة</label>
            <input type="text" id="walletNumber" placeholder="مثال: 01012345678">
        </div>
        <div class="form-group">
            <label>قيمة المساعدة</label>
            <input type="number" id="aidAmount" placeholder="قيمة المساعدة">
        </div>
        <div class="form-group">
            <label>نوع المساعدة</label>
            <select id="aidType">
                <option value="شهرية">شهرية</option>
                <option value="مرة واحدة">مرة واحدة</option>
                <option value="طارئة">طارئة</option>
                <option value="علاج">علاج</option>
            </select>
        </div>
        <div class="form-group">
            <label>ملاحظات</label>
            <textarea id="notes" rows="3" placeholder="سبب إضافة الحالة للمساعدات الخاصة..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveSpecialCase()">💾 حفظ الحالة الخاصة</button>
    </div>

    <!-- جدول الحالات الخاصة -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">📋 قائمة الحالات الخاصة</div>
            <button class="btn btn-success" onclick="exportSpecialCases()">📊 تصدير</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr><th>م.ع</th><th>الاسم</th><th>رقم المحفظة</th><th>قيمة المساعدة</th><th>نوع المساعدة</th><th>الحالة</th><th>تاريخ الإضافة</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="specialCasesTable">
                    <tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let specialCases = [];
    let allCases = [];

    function loadFromStorage() {
        // تحميل الحالات الخاصة
        const savedSpecial = localStorage.getItem('special_cases');
        if (savedSpecial) {
            specialCases = JSON.parse(savedSpecial);
        } else {
            specialCases = [
                { id: 1, caseId: 101, name: "أحمد محمود علي", serial: 101, walletNumber: "01012345678", amount: 500, type: "شهرية", status: "pending", notes: "حالة خاصة لعائلة كبيرة", createdAt: "2026-03-01" },
                { id: 2, caseId: 102, name: "سارة علي إبراهيم", serial: 102, walletNumber: "01123456789", amount: 1000, type: "علاج", status: "transferred", notes: "حالة مرضية مستعجلة", createdAt: "2026-03-05" },
                { id: 3, caseId: 103, name: "محمود خالد سعيد", serial: 103, walletNumber: "01234567890", amount: 300, type: "طارئة", status: "pending", notes: "ظروف طارئة", createdAt: "2026-03-10" }
            ];
            saveToStorage();
        }
        
        // بيانات تجريبية للحالات العادية
        allCases = [
            { id: 1, serial: 101, name: "أحمد محمود علي" },
            { id: 2, serial: 102, name: "سارة علي إبراهيم" },
            { id: 3, serial: 103, name: "محمود خالد سعيد" },
            { id: 4, serial: 104, name: "فاطمة حسن محمد" },
            { id: 5, serial: 105, name: "علي إبراهيم محمود" }
        ];
        
        updateStats();
        renderSpecialCases();
        loadCaseSelect();
    }
    
    function saveToStorage() {
        localStorage.setItem('special_cases', JSON.stringify(specialCases));
    }
    
    function loadCaseSelect() {
        const select = document.getElementById('selectCase');
        select.innerHTML = '<option value="">-- اختر حالة --</option>' + 
            allCases.map(c => `<option value="${c.id}" data-name="${c.name}" data-serial="${c.serial}">${c.name} (م.ع ${c.serial})</option>`).join('');
    }
    
    function loadCaseData() {
        const select = document.getElementById('selectCase');
        const selectedOption = select.options[select.selectedIndex];
        const name = selectedOption.getAttribute('data-name');
        const serial = selectedOption.getAttribute('data-serial');
        document.getElementById('caseName').value = name || '';
        document.getElementById('caseSerial').value = serial || '';
    }
    
    document.getElementById('selectCase').addEventListener('change', loadCaseData);
    
    function updateStats() {
        const total = specialCases.length;
        const transferred = specialCases.filter(c => c.status === "transferred").length;
        const pending = specialCases.filter(c => c.status === "pending").length;
        const totalAmount = specialCases.reduce((sum, c) => sum + c.amount, 0);
        
        document.getElementById('totalSpecial').innerText = total;
        document.getElementById('totalTransferred').innerText = transferred;
        document.getElementById('totalPending').innerText = pending;
        document.getElementById('totalAmount').innerText = totalAmount.toLocaleString('ar-EG');
    }
    
    function renderSpecialCases() {
        const tbody = document.getElementById('specialCasesTable');
        if (specialCases.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد حالات خاصة</td></tr>';
            return;
        }
        
        tbody.innerHTML = specialCases.map(c => `
            <tr>
                <td>${c.serial}</td>
                <td>${c.name}</td>
                <td>${c.walletNumber || '—'}</td>
                <td>${c.amount.toLocaleString('ar-EG')} ج.م</td>
                <td>${c.type}</td>
                <td>${c.status === 'transferred' ? '<span class="transfer-badge">✅ تم التحويل</span>' : '<span class="pending-badge">⏳ بانتظار التحويل</span>'}</td>
                <td>${c.createdAt}</td>
                <td class="action-icons">
                    ${c.status === 'pending' ? `<button class="btn btn-success" onclick="transferCase(${c.id})" style="padding:4px 8px;">💸 تحويل</button>` : ''}
                    <button class="btn btn-warning" onclick="editSpecialCase(${c.id})" style="padding:4px 8px;">✏️</button>
                    <button class="btn btn-danger" onclick="deleteSpecialCase(${c.id})" style="padding:4px 8px;">🗑️</button>
                </td>
            </tr>
        `).join('');
    }
    
    function saveSpecialCase() {
        const caseSerial = document.getElementById('caseSerial').value;
        const caseName = document.getElementById('caseName').value;
        const walletNumber = document.getElementById('walletNumber').value;
        const amount = parseFloat(document.getElementById('aidAmount').value);
        const type = document.getElementById('aidType').value;
        const notes = document.getElementById('notes').value;
        
        if (!caseSerial || !caseName || !walletNumber || !amount) {
            showToast('الرجاء ملء جميع الحقول المطلوبة');
            return;
        }
        
        const newId = specialCases.length > 0 ? Math.max(...specialCases.map(c => c.id)) + 1 : 1;
        specialCases.push({
            id: newId,
            caseId: parseInt(caseSerial),
            name: caseName,
            serial: parseInt(caseSerial),
            walletNumber: walletNumber,
            amount: amount,
            type: type,
            status: 'pending',
            notes: notes,
            createdAt: new Date().toISOString().slice(0,10)
        });
        
        saveToStorage();
        updateStats();
        renderSpecialCases();
        clearSpecialForm();
        showToast('✅ تم إضافة الحالة الخاصة بنجاح');
    }
    
    function transferCase(id) {
        const caseData = specialCases.find(c => c.id === id);
        if (!caseData) return;
        
        if (confirm(`هل أنت متأكد من تحويل ${caseData.amount} جنيه إلى ${caseData.name}؟`)) {
            caseData.status = 'transferred';
            saveToStorage();
            updateStats();
            renderSpecialCases();
            showToast('✅ تم تحويل المساعدة بنجاح');
        }
    }
    
    function editSpecialCase(id) {
        const caseData = specialCases.find(c => c.id === id);
        if (!caseData) return;
        
        const newAmount = prompt('تعديل قيمة المساعدة:', caseData.amount);
        if (newAmount) caseData.amount = parseFloat(newAmount);
        
        const newWallet = prompt('تعديل رقم المحفظة:', caseData.walletNumber);
        if (newWallet) caseData.walletNumber = newWallet;
        
        saveToStorage();
        updateStats();
        renderSpecialCases();
        showToast('✅ تم التعديل');
    }
    
    function deleteSpecialCase(id) {
        if (confirm('هل أنت متأكد من حذف هذه الحالة الخاصة؟')) {
            specialCases = specialCases.filter(c => c.id !== id);
            saveToStorage();
            updateStats();
            renderSpecialCases();
            showToast('🗑️ تم الحذف');
        }
    }
    
    function exportSpecialCases() {
        let csv = 'الرقم المسلسل,الاسم,رقم المحفظة,قيمة المساعدة,نوع المساعدة,الحالة,تاريخ الإضافة,ملاحظات\n';
        specialCases.forEach(c => {
            csv += `${c.serial},${c.name},${c.walletNumber},${c.amount},${c.type},${c.status},${c.createdAt},${c.notes}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `special_cases_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📊 تم تصدير البيانات');
    }
    
    function clearSpecialForm() {
        document.getElementById('selectCase').value = '';
        document.getElementById('caseName').value = '';
        document.getElementById('caseSerial').value = '';
        document.getElementById('walletNumber').value = '';
        document.getElementById('aidAmount').value = '';
        document.getElementById('aidType').value = 'شهرية';
        document.getElementById('notes').value = '';
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function goBack() {
        window.location.href = '/index.html';
    }
    
    loadFromStorage();
</script>
</body>
</html>
