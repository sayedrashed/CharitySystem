<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحضور والانصراف - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: #0F1117; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #0F1117; }
        .btn:hover { transform: translateY(-1px); opacity: 0.9; }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .status-present { color: var(--success); }
        .status-absent { color: var(--danger); }
        .status-late { color: var(--warning); }
        .status-leave { color: var(--accent); }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">📋 الحضور والانصراف</div>
</div>

<div class="container">
    
    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="totalEmployees">0</div>
            <div class="label">إجمالي الموظفين</div>
        </div>
        <div class="stat-card">
            <div class="value" id="presentToday">0</div>
            <div class="label">الحضور اليوم</div>
        </div>
        <div class="stat-card">
            <div class="value" id="absentToday">0</div>
            <div class="label">الغياب اليوم</div>
        </div>
        <div class="stat-card">
            <div class="value" id="lateToday">0</div>
            <div class="label">تأخير اليوم</div>
        </div>
    </div>

    <!-- تسجيل الحضور السريع -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">✅ تسجيل حضور سريع</div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>اختر الموظف</label>
                <select id="employeeSelect">
                    <option value="">-- اختر موظف --</option>
                </select>
            </div>
            <div class="form-group">
                <label>الحالة</label>
                <select id="attendanceStatus">
                    <option value="present">✅ حضور</option>
                    <option value="absent">❌ غياب</option>
                    <option value="late">⏰ تأخير</option>
                    <option value="leave">📅 إجازة</option>
                </select>
            </div>
        </div>
        <div class="form-group" id="lateReasonGroup" style="display:none;">
            <label>سبب التأخير</label>
            <select id="lateReason">
                <option value="car">سيارة الجمعية (لا يخصم)</option>
                <option value="public">مواصلات عامة (يخصم)</option>
                <option value="personal">عذر شخصي (يخصم)</option>
                <option value="technical">عطل تقني (لا يخصم)</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="recordAttendance()">💾 تسجيل</button>
    </div>

    <!-- جدول الحضور اليومي -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">📊 سجل الحضور اليوم</div>
            <button class="btn btn-success" onclick="exportAttendance()">📊 تصدير</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr><th>#</th><th>الموظف</th><th>القسم</th><th>وقت الحضور</th><th>وقت الانصراف</th><th>الحالة</th><th>السبب</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="attendanceTable">
                    <tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let employees = [
        { id: 1, name: "أحمد محمد", department: "حالات", gender: "male" },
        { id: 2, name: "بشرى أحمد", department: "حالات", gender: "female" },
        { id: 3, name: "أشرف محمد", department: "حالات", gender: "male" },
        { id: 4, name: "آية عبد المنعم", department: "حالات", gender: "female" },
        { id: 5, name: "ريهام صابر", department: "حالات", gender: "female" },
        { id: 6, name: "محمود خالد", department: "حالات", gender: "male" }
    ];
    
    let attendance = [];
    
    function loadFromStorage() {
        const saved = localStorage.getItem('hr_attendance');
        if (saved) attendance = JSON.parse(saved);
        else {
            const today = new Date().toISOString().slice(0,10);
            attendance = employees.map(emp => ({
                id: emp.id,
                name: emp.name,
                department: emp.department,
                date: today,
                checkIn: null,
                checkOut: null,
                status: 'absent',
                reason: null
            }));
            saveToStorage();
        }
        updateStats();
        renderAttendance();
        loadEmployeeSelect();
    }
    
    function saveToStorage() {
        localStorage.setItem('hr_attendance', JSON.stringify(attendance));
    }
    
    function loadEmployeeSelect() {
        const select = document.getElementById('employeeSelect');
        select.innerHTML = '<option value="">-- اختر موظف --</option>' + 
            employees.map(emp => `<option value="${emp.id}">${emp.name}</option>`).join('');
    }
    
    function updateStats() {
        const today = new Date().toISOString().slice(0,10);
        const todayAttendance = attendance.filter(a => a.date === today);
        document.getElementById('totalEmployees').innerText = employees.length;
        document.getElementById('presentToday').innerText = todayAttendance.filter(a => a.status === 'present').length;
        document.getElementById('absentToday').innerText = todayAttendance.filter(a => a.status === 'absent').length;
        document.getElementById('lateToday').innerText = todayAttendance.filter(a => a.status === 'late').length;
    }
    
    function renderAttendance() {
        const tbody = document.getElementById('attendanceTable');
        const today = new Date().toISOString().slice(0,10);
        const todayAttendance = attendance.filter(a => a.date === today);
        
        if (todayAttendance.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>';
            return;
        }
        
        const statusText = { present: '✅ حضور', absent: '❌ غياب', late: '⏰ تأخير', leave: '📅 إجازة' };
        const statusClass = { present: 'status-present', absent: 'status-absent', late: 'status-late', leave: 'status-leave' };
        
        tbody.innerHTML = todayAttendance.map((att, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td>${att.name}</td>
                <td>${att.department}</td>
                <td>${att.checkIn || '—'}</td>
                <td>${att.checkOut || '—'}</td>
                <td class="${statusClass[att.status]}">${statusText[att.status]}</td>
                <td>${att.reason === 'car' ? 'سيارة الجمعية' : att.reason === 'public' ? 'مواصلات عامة' : att.reason === 'personal' ? 'عذر شخصي' : att.reason === 'technical' ? 'عطل تقني' : '—'}</td>
                <td><button class="btn btn-warning" onclick="editAttendance(${att.id})" style="padding:4px 8px;">✏️</button></td>
            </tr>
        `).join('');
    }
    
    document.getElementById('attendanceStatus').addEventListener('change', function() {
        const group = document.getElementById('lateReasonGroup');
        group.style.display = this.value === 'late' ? 'block' : 'none';
    });
    
    function recordAttendance() {
        const empId = parseInt(document.getElementById('employeeSelect').value);
        const status = document.getElementById('attendanceStatus').value;
        const lateReason = document.getElementById('lateReason').value;
        
        if (!empId) {
            showToast('الرجاء اختيار موظف');
            return;
        }
        
        const today = new Date().toISOString().slice(0,10);
        const now = new Date().toLocaleTimeString('ar-EG');
        
        let attIndex = attendance.findIndex(a => a.id === empId && a.date === today);
        if (attIndex === -1) {
            attendance.push({
                id: empId,
                name: employees.find(e => e.id === empId).name,
                department: employees.find(e => e.id === empId).department,
                date: today,
                checkIn: status === 'present' || status === 'late' ? now : null,
                checkOut: null,
                status: status,
                reason: status === 'late' ? lateReason : null
            });
        } else {
            attendance[attIndex].status = status;
            attendance[attIndex].reason = status === 'late' ? lateReason : null;
            if (status === 'present' || status === 'late') {
                if (!attendance[attIndex].checkIn) attendance[attIndex].checkIn = now;
            }
        }
        
        saveToStorage();
        updateStats();
        renderAttendance();
        showToast('✅ تم تسجيل الحضور');
        
        document.getElementById('employeeSelect').value = '';
        document.getElementById('attendanceStatus').value = 'present';
        document.getElementById('lateReasonGroup').style.display = 'none';
    }
    
    function editAttendance(id) {
        const today = new Date().toISOString().slice(0,10);
        const att = attendance.find(a => a.id === id && a.date === today);
        if (!att) return;
        
        const newStatus = prompt('الحالة (present/absent/late/leave):', att.status);
        if (newStatus && ['present', 'absent', 'late', 'leave'].includes(newStatus)) {
            att.status = newStatus;
            if (newStatus === 'late') {
                att.reason = prompt('سبب التأخير (car/public/personal/technical):', att.reason || 'car');
            } else {
                att.reason = null;
            }
            saveToStorage();
            renderAttendance();
            updateStats();
            showToast('✅ تم التعديل');
        }
    }
    
    function exportAttendance() {
        const today = new Date().toISOString().slice(0,10);
        const todayAttendance = attendance.filter(a => a.date === today);
        let csv = 'الموظف,القسم,وقت الحضور,وقت الانصراف,الحالة,السبب\n';
        todayAttendance.forEach(a => {
            csv += `${a.name},${a.department},${a.checkIn || ''},${a.checkOut || ''},${a.status},${a.reason || ''}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `attendance_${today}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📊 تم تصدير البيانات');
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function goBack() { window.location.href = '/index.html'; }
    
    loadFromStorage();
</script>
</body>
</html>
