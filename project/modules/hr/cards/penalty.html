<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العقوبات والجزاءات - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
            --info: #17a2b8;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
            transition: var(--transition);
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .back-btn:hover {
            border-color: var(--accent);
            transform: translateX(-4px);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-badge {
            background: var(--danger);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin: 0 24px 24px 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: #0F1117;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: #0F1117;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
            margin: 0 24px 24px 24px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .status-pending {
            color: var(--warning);
        }

        .status-applied {
            color: var(--success);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">⚠️ العقوبات والجزاءات</div>
    <div class="user-area">
        <div class="admin-badge" id="adminBadge" style="display:none;">👑 للمدير فقط</div>
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-name" id="userName"></div>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="value" id="totalPenalties">0</div>
        <div class="label">إجمالي الجزاءات</div>
    </div>
    <div class="stat-card">
        <div class="value" id="pendingPenalties">0</div>
        <div class="label">قيد المراجعة</div>
    </div>
    <div class="stat-card">
        <div class="value" id="totalAmount">0</div>
        <div class="label">إجمالي المبلغ (ج.م)</div>
    </div>
    <div class="stat-card">
        <div class="value" id="appliedAmount">0</div>
        <div class="label">تم الخصم (ج.م)</div>
    </div>
</div>

<!-- تسجيل جزاء جديد -->
<div class="card">
    <div class="card-header">
        <div class="card-title">➕ تسجيل جزاء جديد</div>
    </div>
    <div class="grid-2">
        <div class="form-group">
            <label>الموظف</label>
            <select id="penaltyEmployee">
                <option value="">-- اختر موظف --</option>
            </select>
        </div>
        <div class="form-group">
            <label>نوع الجزاء</label>
            <select id="penaltyType">
                <option value="تأخير">تأخير</option>
                <option value="غياب بدون إذن">غياب بدون إذن</option>
                <option value="خطأ في الإدخال">خطأ في الإدخال</option>
                <option value="إهمال">إهمال</option>
                <option value="مخالفة إدارية">مخالفة إدارية</option>
                <option value="أخرى">أخرى</option>
            </select>
        </div>
    </div>
    <div class="grid-2">
        <div class="form-group">
            <label>المبلغ (ج.م)</label>
            <input type="number" id="penaltyAmount" placeholder="المبلغ">
        </div>
        <div class="form-group">
            <label>التاريخ</label>
            <input type="date" id="penaltyDate">
        </div>
    </div>
    <div class="form-group">
        <label>سبب الجزاء</label>
        <textarea id="penaltyReason" rows="3" placeholder="سبب الجزاء"></textarea>
    </div>
    <button class="btn btn-primary" onclick="addPenalty()">➕ تسجيل</button>
</div>

<!-- قائمة الجزاءات -->
<div class="table-container">
    <table class="data-table">
        <thead>
            <tr>
                <th>#</th>
                <th>الموظف</th>
                <th>نوع الجزاء</th>
                <th>التاريخ</th>
                <th>المبلغ (ج.م)</th>
                <th>السبب</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="penaltiesTable">
            <tr><td colspan="8" style="text-align:center;">جاري التحميل...<\/td><\/tr>
        </tbody>
    </table>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================================
    // بيانات تجريبية
    // ============================================================
    let employees = [
        { id: 1, name: "أحمد محمد", department: "حالات", active: true },
        { id: 2, name: "بشرى أحمد", department: "حالات", active: true },
        { id: 3, name: "أشرف محمد", department: "حالات", active: true },
        { id: 4, name: "آية عبد المنعم", department: "حالات", active: true },
        { id: 5, name: "ريهام صابر", department: "حالات", active: true }
    ];
    
    let penalties = [
        { id: 1, employeeId: 1, employeeName: "أحمد محمد", type: "تأخير", amount: 50, date: "2026-04-01", reason: "تأخير 30 دقيقة", status: "applied", appliedAt: "2026-04-02" },
        { id: 2, employeeId: 2, employeeName: "بشرى أحمد", type: "خطأ في الإدخال", amount: 25, date: "2026-04-02", reason: "إدخال بيانات خاطئة", status: "pending", appliedAt: null }
    ];
    
    let currentUser = { role: "admin", name: "سيد راشد", avatar: "👑" };
    
    // ============================================================
    // دوال مساعدة
    // ============================================================
    function loadUserRole() {
        const user = JSON.parse(localStorage.getItem('currentUser') || '{"role":"admin","name":"سيد راشد","avatar":"👑"}');
        currentUser = user;
        const isAdmin = user.role === 'admin';
        const adminBadge = document.getElementById('adminBadge');
        if (adminBadge) adminBadge.style.display = isAdmin ? 'inline-block' : 'none';
        document.getElementById('userAvatar').innerText = user.avatar || '👤';
        document.getElementById('userName').innerText = user.name || 'مدير';
    }
    
    function loadFromStorage() {
        const saved = localStorage.getItem('hr_penalties');
        if (saved) penalties = JSON.parse(saved);
        updateStats();
        renderPenalties();
        loadEmployeeSelect();
    }
    
    function saveToStorage() {
        localStorage.setItem('hr_penalties', JSON.stringify(penalties));
    }
    
    function loadEmployeeSelect() {
        const select = document.getElementById('penaltyEmployee');
        const activeEmployees = employees.filter(e => e.active);
        select.innerHTML = '<option value="">-- اختر موظف --</option>' + 
            activeEmployees.map(emp => `<option value="${emp.id}">${emp.name}</option>`).join('');
        document.getElementById('penaltyDate').value = new Date().toISOString().slice(0, 10);
    }
    
    function updateStats() {
        const total = penalties.length;
        const pending = penalties.filter(p => p.status === 'pending').length;
        const totalAmount = penalties.reduce((sum, p) => sum + p.amount, 0);
        const appliedAmount = penalties.filter(p => p.status === 'applied').reduce((sum, p) => sum + p.amount, 0);
        
        document.getElementById('totalPenalties').innerText = total;
        document.getElementById('pendingPenalties').innerText = pending;
        document.getElementById('totalAmount').innerText = totalAmount.toLocaleString('ar-EG');
        document.getElementById('appliedAmount').innerText = appliedAmount.toLocaleString('ar-EG');
    }
    
    function renderPenalties() {
        const tbody = document.getElementById('penaltiesTable');
        const isAdmin = currentUser.role === 'admin';
        
        if (penalties.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد جزاءات<\/td><\/tr>';
            return;
        }
        
        const statusText = { pending: '⏳ قيد المراجعة', applied: '✅ تم التطبيق' };
        const statusClass = { pending: 'status-pending', applied: 'status-applied' };
        
        tbody.innerHTML = penalties.map((p, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td>${p.employeeName}</td>
                <td>${p.type}</td>
                <td>${p.date}</td>
                <td>${p.amount.toLocaleString('ar-EG')} ج.م<\/td>
                <td style="max-width:200px; white-space:normal;">${p.reason || '—'}<\/td>
                <td class="${statusClass[p.status]}">${statusText[p.status]}<\/td>
                <td class="action-icons">
                    ${isAdmin && p.status === 'pending' ? `
                        <button class="btn btn-success" onclick="applyPenalty(${p.id})" style="padding:4px 8px;">✅ تطبيق</button>
                        <button class="btn btn-danger" onclick="rejectPenalty(${p.id})" style="padding:4px 8px;">🗑️ حذف</button>
                    ` : '—'}
                    ${isAdmin && p.status === 'applied' ? `
                        <button class="btn btn-danger" onclick="rejectPenalty(${p.id})" style="padding:4px 8px;">🗑️ حذف</button>
                    ` : '—'}
                <\/td>
            </tr>
        `).join('');
    }
    
    // ============================================================
    // إضافة جزاء جديد
    // ============================================================
    function addPenalty() {
        const employeeId = parseInt(document.getElementById('penaltyEmployee').value);
        const type = document.getElementById('penaltyType').value;
        const amount = parseFloat(document.getElementById('penaltyAmount').value);
        const date = document.getElementById('penaltyDate').value;
        const reason = document.getElementById('penaltyReason').value;
        
        if (!employeeId || !amount || !date) {
            showToast('الرجاء اختيار الموظف وإدخال المبلغ والتاريخ');
            return;
        }
        
        const employee = employees.find(e => e.id === employeeId);
        if (!employee) return;
        
        const newId = penalties.length > 0 ? Math.max(...penalties.map(p => p.id)) + 1 : 1;
        penalties.push({
            id: newId,
            employeeId: employeeId,
            employeeName: employee.name,
            type: type,
            amount: amount,
            date: date,
            reason: reason,
            status: 'pending',
            appliedAt: null
        });
        
        saveToStorage();
        updateStats();
        renderPenalties();
        clearPenaltyForm();
        showToast('✅ تم تسجيل الجزاء بنجاح');
    }
    
    function clearPenaltyForm() {
        document.getElementById('penaltyEmployee').value = '';
        document.getElementById('penaltyType').value = 'تأخير';
        document.getElementById('penaltyAmount').value = '';
        document.getElementById('penaltyDate').value = new Date().toISOString().slice(0, 10);
        document.getElementById('penaltyReason').value = '';
    }
    
    // ============================================================
    // تطبيق الجزاء (للمدير فقط)
    // ============================================================
    function applyPenalty(id) {
        if (currentUser.role !== 'admin') {
            showToast('هذه الخاصية متاحة للمدير فقط');
            return;
        }
        
        const penalty = penalties.find(p => p.id === id);
        if (!penalty) return;
        
        penalty.status = 'applied';
        penalty.appliedAt = new Date().toISOString().slice(0, 10);
        
        // تحديث خصومات الموظف (للاستخدام في كشف المرتبات)
        updateEmployeeDeductions(penalty.employeeId, penalty.amount);
        
        saveToStorage();
        updateStats();
        renderPenalties();
        showToast(`✅ تم تطبيق جزاء ${penalty.type} على ${penalty.employeeName}`);
    }
    
    function rejectPenalty(id) {
        if (currentUser.role !== 'admin') {
            showToast('هذه الخاصية متاحة للمدير فقط');
            return;
        }
        
        if (confirm('هل أنت متأكد من حذف هذا الجزاء؟')) {
            penalties = penalties.filter(p => p.id !== id);
            saveToStorage();
            updateStats();
            renderPenalties();
            showToast('🗑️ تم حذف الجزاء');
        }
    }
    
    function updateEmployeeDeductions(employeeId, amount) {
        // تحديث الخصومات في كشف المرتبات (تخزين مؤقت)
        let deductions = JSON.parse(localStorage.getItem('hr_deductions') || '{}');
        deductions[employeeId] = (deductions[employeeId] || 0) + amount;
        localStorage.setItem('hr_deductions', JSON.stringify(deductions));
    }
    
    // ============================================================
    // دوال مساعدة
    // ============================================================
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    function goBack() {
        window.location.href = '/modules/hr/index.html';
    }
    
    // ============================================================
    // التهيئة
    // ============================================================
    function init() {
        loadUserRole();
        loadFromStorage();
    }
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
