<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف المرتبات - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            background: var(--danger);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: #0F1117; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #0F1117; }
        .btn:hover { transform: translateY(-1px); opacity: 0.9; }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            z-index: 1000;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()"><span>←</span> العودة</button>
    <div class="page-title">💰 كشف المرتبات</div>
    <div class="user-area">
        <div class="admin-badge" id="adminBadge" style="display:none;">👑 للمدير فقط</div>
    </div>
</div>

<div class="container">
    
    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="totalEmployees">0</div>
            <div class="label">إجمالي الموظفين</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalSalaries">0</div>
            <div class="label">إجمالي المرتبات</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalDeductions">0</div>
            <div class="label">إجمالي الخصومات</div>
        </div>
        <div class="stat-card">
            <div class="value" id="netSalaries">0</div>
            <div class="label">الصافي</div>
        </div>
    </div>

    <!-- إضافة موظف جديد -->
    <div class="card" id="addEmployeeCard" style="display:none;">
        <div class="card-header">
            <div class="card-title">➕ إضافة موظف جديد</div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>الاسم</label>
                <input type="text" id="empName" placeholder="الاسم الكامل">
            </div>
            <div class="form-group">
                <label>القسم</label>
                <select id="empDepartment">
                    <option value="حالات">حالات</option>
                    <option value="حسابات">حسابات</option>
                    <option value="HR">HR</option>
                    <option value="إدارة">إدارة</option>
                </select>
            </div>
            <div class="form-group">
                <label>المرتب الأساسي</label>
                <input type="number" id="empBaseSalary" placeholder="المرتب الأساسي">
            </div>
            <div class="form-group">
                <label>بدل انتقال</label>
                <input type="number" id="empTransport" placeholder="بدل انتقال">
            </div>
        </div>
        <button class="btn btn-primary" onclick="addEmployee()">➕ إضافة</button>
    </div>

    <!-- جدول المرتبات -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">📊 كشف المرتبات</div>
            <div>
                <button class="btn btn-success" onclick="exportSalaries()">📊 تصدير</button>
                <button class="btn btn-primary" onclick="calculateSalaries()">🔄 حساب المرتبات</button>
            </div>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr><th>#</th><th>الموظف</th><th>القسم</th><th>المرتب الأساسي</th><th>بدل انتقال</th><th>بدل وجبة</th><th>الخصومات</th><th>الصافي</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="salariesTable">
                    <tr><td colspan="9" style="text-align:center;">لا توجد بيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let employees = [
        { id: 1, name: "أحمد محمد", department: "حالات", baseSalary: 3500, transport: 300, gender: "male", active: true },
        { id: 2, name: "بشرى أحمد", department: "حالات", baseSalary: 3400, transport: 250, gender: "female", active: true },
        { id: 3, name: "أشرف محمد", department: "حالات", baseSalary: 3800, transport: 350, gender: "male", active: true },
        { id: 4, name: "آية عبد المنعم", department: "حالات", baseSalary: 3600, transport: 300, gender: "female", active: true },
        { id: 5, name: "ريهام صابر", department: "حالات", baseSalary: 3500, transport: 300, gender: "female", active: true }
    ];
    
    let currentUser = { role: "admin" }; // سيتم استبداله من localStorage
    
    function loadUserRole() {
        const user = JSON.parse(localStorage.getItem('currentUser') || '{"role":"admin"}');
        currentUser = user;
        const isAdmin = user.role === 'admin';
        const addCard = document.getElementById('addEmployeeCard');
        const adminBadge = document.getElementById('adminBadge');
        if (addCard) addCard.style.display = isAdmin ? 'block' : 'none';
        if (adminBadge) adminBadge.style.display = isAdmin ? 'inline-block' : 'none';
    }
    
    function loadFromStorage() {
        const saved = localStorage.getItem('hr_employees');
        if (saved) employees = JSON.parse(saved);
        updateStats();
        renderSalaries();
    }
    
    function saveToStorage() {
        localStorage.setItem('hr_employees', JSON.stringify(employees));
        updateStats();
        renderSalaries();
    }
    
    function updateStats() {
        const activeEmployees = employees.filter(e => e.active);
        document.getElementById('totalEmployees').innerText = activeEmployees.length;
        renderSalaries();
    }
    
    function calculateSalary(emp) {
        const mealAllowance = 220; // 22 يوم × 10 جنيه
        let deductions = 0;
        let net = emp.baseSalary + emp.transport + mealAllowance - deductions;
        return { mealAllowance, deductions, net };
    }
    
    function renderSalaries() {
        const tbody = document.getElementById('salariesTable');
        const activeEmployees = employees.filter(e => e.active);
        
        if (activeEmployees.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">لا توجد موظفين</td></tr>';
            return;
        }
        
        let totalSalaries = 0, totalDeductions = 0, totalNet = 0;
        
        tbody.innerHTML = activeEmployees.map((emp, idx) => {
            const { mealAllowance, deductions, net } = calculateSalary(emp);
            totalSalaries += emp.baseSalary;
            totalDeductions += deductions;
            totalNet += net;
            return `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${emp.name}${!emp.active ? ' (غير نشط)' : ''}</td>
                    <td>${emp.department}</td>
                    <td>${emp.baseSalary.toLocaleString('ar-EG')}</td>
                    <td>${emp.transport.toLocaleString('ar-EG')}</td>
                    <td>${mealAllowance.toLocaleString('ar-EG')}</td>
                    <td>${deductions.toLocaleString('ar-EG')}</td>
                    <td><strong>${net.toLocaleString('ar-EG')}</strong></td>
                    <td>
                        ${currentUser.role === 'admin' ? `<button class="btn btn-warning" onclick="editEmployee(${emp.id})" style="padding:4px 8px;">✏️</button>
                        <button class="btn btn-danger" onclick="deleteEmployee(${emp.id})" style="padding:4px 8px;">🗑️</button>` : '—'}
                    </td>
                </tr>
            `;
        }).join('');
        
        document.getElementById('totalSalaries').innerText = totalSalaries.toLocaleString('ar-EG');
        document.getElementById('totalDeductions').innerText = totalDeductions.toLocaleString('ar-EG');
        document.getElementById('netSalaries').innerText = totalNet.toLocaleString('ar-EG');
    }
    
    function calculateSalaries() {
        renderSalaries();
        showToast('✅ تم حساب المرتبات');
    }
    
    function addEmployee() {
        if (currentUser.role !== 'admin') {
            showToast('هذه الخاصية متاحة للمدير فقط');
            return;
        }
        
        const name = document.getElementById('empName').value.trim();
        const department = document.getElementById('empDepartment').value;
        const baseSalary = parseFloat(document.getElementById('empBaseSalary').value);
        const transport = parseFloat(document.getElementById('empTransport').value);
        
        if (!name || !baseSalary) {
            showToast('الرجاء إدخال الاسم والمرتب الأساسي');
            return;
        }
        
        const newId = employees.length > 0 ? Math.max(...employees.map(e => e.id)) + 1 : 1;
        employees.push({
            id: newId, name, department, baseSalary, transport,
            gender: "male", active: true
        });
        
        saveToStorage();
        clearAddForm();
        showToast('✅ تم إضافة الموظف');
    }
    
    function editEmployee(id) {
        if (currentUser.role !== 'admin') {
            showToast('هذه الخاصية متاحة للمدير فقط');
            return;
        }
        
        const emp = employees.find(e => e.id === id);
        if (!emp) return;
        
        const newName = prompt('الاسم:', emp.name);
        const newBaseSalary = prompt('المرتب الأساسي:', emp.baseSalary);
        const newTransport = prompt('بدل الانتقال:', emp.transport);
        
        if (newName) emp.name = newName;
        if (newBaseSalary) emp.baseSalary = parseFloat(newBaseSalary);
        if (newTransport) emp.transport = parseFloat(newTransport);
        
        saveToStorage();
        showToast('✅ تم التعديل');
    }
    
    function deleteEmployee(id) {
        if (currentUser.role !== 'admin') {
            showToast('هذه الخاصية متاحة للمدير فقط');
            return;
        }
        
        if (confirm('هل أنت متأكد من حذف هذا الموظف؟')) {
            employees = employees.filter(e => e.id !== id);
            saveToStorage();
            showToast('🗑️ تم الحذف');
        }
    }
    
    function exportSalaries() {
        const activeEmployees = employees.filter(e => e.active);
        let csv = 'الموظف,القسم,المرتب الأساسي,بدل انتقال,بدل وجبة,الخصومات,الصافي\n';
        activeEmployees.forEach(emp => {
            const { mealAllowance, deductions, net } = calculateSalary(emp);
            csv += `${emp.name},${emp.department},${emp.baseSalary},${emp.transport},${mealAllowance},${deductions},${net}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `salaries_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📊 تم تصدير البيانات');
    }
    
    function clearAddForm() {
        document.getElementById('empName').value = '';
        document.getElementById('empBaseSalary').value = '';
        document.getElementById('empTransport').value = '';
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function goBack() { window.location.href = '/index.html'; }
    
    loadUserRole();
    loadFromStorage();
</script>
</body>
</html>
