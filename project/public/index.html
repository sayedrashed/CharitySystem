<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة البحث الاجتماعي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --warning: #F59E0B;
            --danger: #F87171;
            --gold: #F5C842;
        }
        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
        .footer {
            margin-top: 60px;
            color: var(--text-secondary);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✨</div>
        <h1>نظام إدارة البحث الاجتماعي</h1>
        <div class="subtitle">جمعية الرحمة الخيرية</div>
        <div class="buttons">
            <a href="/login" class="btn btn-primary">🔑 تسجيل الدخول</a>
            <a href="#" class="btn btn-secondary" onclick="alert('للحصول على نسخة تجريبية، يرجى التواصل مع المدير')">📱 نسخة تجريبية</a>
        </div>
        <div class="footer">
            © 2026 جمعية الرحمة الخيرية - جميع الحقوق محفوظة
        </div>
    </div>
</body>
</html>
