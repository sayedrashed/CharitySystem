<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة البحث الاجتماعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1A1D27;
            --border: #2E3250;
            --text-primary: #E8EBF4;
            --text-secondary: #6B7280;
            --accent: #4F8EF7;
            --success: #2DD4BF;
            --danger: #F87171;
            --gold: #F5C842;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0F1117 0%, #1A1D27 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; margin-bottom: 15px; }
        .logo-area h1 { font-size: 24px; font-weight: 700; background: linear-gradient(90deg, var(--gold), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .logo-area p { font-size: 13px; color: var(--text-secondary); }

        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 14px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; right: 15px; font-size: 18px; color: var(--text-secondary); }
        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 142, 247, 0.2); }
        .form-group input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        .checkbox-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary); font-size: 13px; }
        .checkbox-label input { width: 16px; height: 16px; cursor: pointer; }
        .forgot-link { color: var(--accent); text-decoration: none; font-size: 13px; }
        .forgot-link:hover { text-decoration: underline; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 142, 247, 0.3); }

        .register-link { text-align: center; font-size: 13px; color: var(--text-secondary); }
        .register-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .register-link a:hover { text-decoration: underline; }

        .error-message {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--danger);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .server-status {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 5px;
        }
        .status-online { background: var(--success); }
        .status-offline { background: var(--danger); }

        @media (max-width: 500px) { .login-card { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon">✨</div>
            <h1 id="orgName">نظام إدارة البحث الاجتماعي</h1>
            <p id="orgSubtitle">جمعية الرحمة الخيرية</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label>👤 اسم المستخدم</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label>🔒 كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور">
                </div>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe"> تذكرني
                </label>
                <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="login-btn" onclick="login()">🔑 تسجيل الدخول</button>
        </form>

        <div class="register-link">
            ليس لديك حساب؟ <a href="#" onclick="showRegister(); return false;">إنشاء حساب جديد</a>
        </div>

        <div class="server-status">
            <span class="status-dot" id="serverStatusDot"></span>
            <span id="serverStatusText">جاري الاتصال بالخادم...</span>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // بيانات المستخدمين (في الإنتاج يتم جلبها من قاعدة البيانات)
    // ============================================================
    const users = [
        { username: "admin", password: "admin123", name: "سيد راشد", role: "admin", avatar: "👑" },
        { username: "boshra", password: "res123", name: "بشرى أحمد", role: "researcher", avatar: "👩" },
        { username: "ashraf", password: "res123", name: "أشرف محمد", role: "researcher", avatar: "👨" },
        { username: "ali", password: "res123", name: "علي إبراهيم", role: "researcher", avatar: "👨" },
        { username: "aya", password: "res123", name: "آية عبد المنعم", role: "researcher", avatar: "👩" },
        { username: "reham", password: "res123", name: "ريهام صابر", role: "researcher", avatar: "👩" }
    ];

    // ============================================================
    // تحميل الإعدادات المحفوظة
    // ============================================================
    
    function loadOrgName() {
        const savedName = localStorage.getItem('orgName');
        if (savedName) {
            document.getElementById('orgName').innerHTML = savedName;
        }
    }

    function loadRememberedUser() {
        const remembered = localStorage.getItem('rememberedUser');
        if (remembered) {
            document.getElementById('username').value = remembered;
            document.getElementById('rememberMe').checked = true;
        }
    }

    function checkServerStatus() {
        const statusDot = document.getElementById('serverStatusDot');
        const statusText = document.getElementById('serverStatusText');
        
        fetch('/api/ping', { timeout: 5000 })
            .then(response => response.ok)
            .then(ok => {
                if (ok) {
                    statusDot.className = 'status-dot status-online';
                    statusText.textContent = 'الخادم متصل';
                } else {
                    statusDot.className = 'status-dot status-offline';
                    statusText.textContent = 'الخادم غير متصل';
                }
            })
            .catch(() => {
                statusDot.className = 'status-dot status-offline';
                statusText.textContent = 'الخادم غير متصل (سيتم العمل محلياً)';
            });
    }

    // ============================================================
    // دوال تسجيل الدخول
    // ============================================================

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }

    function showForgotPassword() {
        alert('🔐 لاستعادة كلمة المرور، يرجى التواصل مع مدير النظام.\n\n📞 01111878692\n📧 admin@charity.com');
    }

    function showRegister() {
        alert('📝 لإنشاء حساب جديد، يرجى التواصل مع مدير النظام.\n\n👑 يتم إنشاء الحسابات بواسطة المدير فقط.');
    }

    function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
            showError('الرجاء إدخال اسم المستخدم وكلمة المرور');
            return;
        }
        
        // محاولة الاتصال بالخادم أولاً
        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                handleSuccessfulLogin(data.user);
            } else {
                // محاولة محلية إذا فشل الخادم
                loginLocal(username, password);
            }
        })
        .catch(() => {
            // خادم غير متاح، استخدام البيانات المحلية
            loginLocal(username, password);
        });
    }

    function loginLocal(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        
        if (!user) {
            showError('اسم المستخدم أو كلمة المرور غير صحيحة');
            return;
        }
        
        const userData = {
            id: user.username,
            name: user.name,
            username: user.username,
            role: user.role,
            avatar: user.avatar,
            loggedInAt: new Date().toISOString()
        };
        
        handleSuccessfulLogin(userData);
    }

    function handleSuccessfulLogin(userData) {
        // حفظ بيانات المستخدم
        localStorage.setItem('currentUser', JSON.stringify(userData));
        
        if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('rememberedUser', userData.username);
        } else {
            localStorage.removeItem('rememberedUser');
        }
        
        // تسجيل حدث الدخول
        console.log(`✅ تسجيل دخول: ${userData.name} (${userData.role})`);
        
        // التوجيه حسب الدور
        if (userData.role === 'admin') {
            window.location.href = '/admin';
        } else {
            window.location.href = '/user';
        }
    }

    // ============================================================
    // التحقق من جلسة نشطة
    // ============================================================

    function checkActiveSession() {
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            const user = JSON.parse(currentUser);
            const currentPath = window.location.pathname;
            
            // إذا كان المستخدم مسجل دخول ويحاول فتح صفحة login، نوجهه للوحة المناسبة
            if (currentPath === '/' || currentPath.includes('login.html')) {
                if (user.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/user';
                }
            }
        }
    }

    // ============================================================
    // التهيئة
    // ============================================================

    function init() {
        loadOrgName();
        loadRememberedUser();
        checkServerStatus();
        checkActiveSession();
        
        // إضافة مستمعي الأحداث لدخول Enter
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        // فحص حالة الخادم كل 30 ثانية
        setInterval(checkServerStatus, 30000);
    }

    init();
</script>

</body>
</html>
